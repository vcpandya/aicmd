name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Syntax check all modules
        run: |
          python -c "
          import ast, glob, sys
          errors = []
          for f in sorted(glob.glob('src/zx/*.py')):
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All {len(glob.glob(\"src/zx/*.py\"))} files pass syntax check.')
          "

      - name: Import check
        run: |
          python -c "
          from zx import __version__
          from zx.config import ZxConfig
          from zx.cost import CostTracker
          from zx.safety import analyze_risk
          from zx.executor import execute_command
          from zx.ai import AIClient
          print(f'All imports OK — zx v{__version__}')
          "

      - name: CLI entry point check
        run: |
          zx --version
